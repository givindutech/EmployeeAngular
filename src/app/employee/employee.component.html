<div class="container py-4">
  <div class="row gx-4 gy-4">

    <!-- Add Employee Form -->
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">Add New Employee</div>
        <div class="card-body">
            <div class="row gx-3 gy-3">

              <div class="col-12">
                <label class="form-label">Name</label>
                <input  type="text" class="form-control">
              </div>
              <div class="col-6">
                <label class="form-label">Contact No</label>
                <input  type="tel" class="form-control">
              </div>
              <div class="col-6">
                <label class="form-label">Email</label>
                <input formControlName="emailId" type="email" class="form-control">
              </div>

              <div class="col-6">
                <label class="form-label">Parent Dept</label>
                <select formControlName="parentDeptId" class="form-select" [{ngModel}]="deptId" name="deptId" (change)="onDeptChange()">
                  <option value="">Select Department</option>
                  @for(item of parentDeptList;track $index){
                    <option [value]="item.departmentId">{{item.departmentName}}</option>
                  }
                  <!-- <option *ngFor="let p of parentDeptList" [value]="p.id">{{p.name}}</option> -->
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Child Dept</label>
                <select formControlName="childDeptId" class="form-select">
                  <option value="">Select...</option>
                  <!-- <option *ngFor="let c of childDepts" [value]="c.id">{{c.name}}</option> -->
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Gender</label>
                <select formControlName="gender" class="form-select">
                  <option value="">Select...</option>
                  <option>Male</option><option>Female</option><option>Other</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Role</label>
                <input formControlName="role" type="text" class="form-control">
              </div>
              <div class="col-6">
                <label class="form-label">Password</label>
                <input formControlName="password" type="password" class="form-control">
              </div>
              <div class="col-6">
                <label class="form-label">Created Date</label>
                <input formControlName="createdDate" type="date" class="form-control">
              </div>

              <div class="col-12">
                <button class="btn btn-success w-100" >
                  Add Employee
                </button>
              </div>

            </div>

        </div>
      </div>
    </div>


  </div>
</div>
